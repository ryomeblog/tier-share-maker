<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="390" height="844" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="195" y="20" text-anchor="middle" fill="#888" font-size="10">Tier List Maker — モバイル ワイヤーフレーム (&lt;768px)</text>

  <!-- ========== HEADER ========== -->
  <rect x="0" y="30" width="390" height="100" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="15" y="55" fill="#e94560" font-size="16" font-weight="bold">Tier List Maker</text>

  <!-- Tier表タイトル -->
  <rect x="15" y="65" width="360" height="28" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="195" y="84" text-anchor="middle" fill="#aaa" font-size="12">My Tier List（タップで編集）</text>

  <!-- アクションボタン（横並び・コンパクト） -->
  <rect x="15" y="100" width="110" height="24" rx="4" fill="#0f3460"/>
  <text x="70" y="116" text-anchor="middle" fill="#fff" font-size="9">📋 URLをコピー</text>

  <rect x="130" y="100" width="110" height="24" rx="4" fill="#0f3460"/>
  <text x="185" y="116" text-anchor="middle" fill="#fff" font-size="9">📷 画像保存</text>

  <rect x="245" y="100" width="80" height="24" rx="4" fill="#533" stroke="#e94560" stroke-width="1"/>
  <text x="285" y="116" text-anchor="middle" fill="#e94560" font-size="9">🔄 リセット</text>

  <!-- ========== TIER AREA ========== -->
  <!-- Tier S -->
  <g transform="translate(10, 140)">
    <rect x="0" y="0" width="50" height="56" fill="#FF6B6B" rx="4"/>
    <text x="25" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">S</text>

    <rect x="56" y="0" width="314" height="56" fill="#2a2a3e" rx="4" stroke="#FF6B6B" stroke-width="1" opacity="0.8"/>
    <rect x="62" y="6" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="84" y="32" text-anchor="middle" fill="#888" font-size="8">IMG</text>
    <rect x="110" y="6" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="132" y="32" text-anchor="middle" fill="#888" font-size="8">IMG</text>
    <rect x="158" y="6" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="180" y="32" text-anchor="middle" fill="#888" font-size="8">IMG</text>
  </g>

  <!-- Tier A -->
  <g transform="translate(10, 202)">
    <rect x="0" y="0" width="50" height="56" fill="#FFA94D" rx="4"/>
    <text x="25" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">A</text>
    <rect x="56" y="0" width="314" height="56" fill="#2a2a3e" rx="4" stroke="#FFA94D" stroke-width="1" opacity="0.8"/>
    <rect x="62" y="6" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="84" y="32" text-anchor="middle" fill="#888" font-size="8">IMG</text>
  </g>

  <!-- Tier B -->
  <g transform="translate(10, 264)">
    <rect x="0" y="0" width="50" height="56" fill="#FFD43B" rx="4"/>
    <text x="25" y="35" text-anchor="middle" fill="#333" font-size="20" font-weight="bold">B</text>
    <rect x="56" y="0" width="314" height="56" fill="#2a2a3e" rx="4" stroke="#FFD43B" stroke-width="1" opacity="0.8"/>
    <rect x="62" y="6" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="84" y="32" text-anchor="middle" fill="#888" font-size="8">IMG</text>
    <rect x="110" y="6" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="132" y="32" text-anchor="middle" fill="#888" font-size="8">IMG</text>
  </g>

  <!-- Tier C -->
  <g transform="translate(10, 326)">
    <rect x="0" y="0" width="50" height="56" fill="#69DB7C" rx="4"/>
    <text x="25" y="35" text-anchor="middle" fill="#333" font-size="20" font-weight="bold">C</text>
    <rect x="56" y="0" width="314" height="56" fill="#2a2a3e" rx="4" stroke="#69DB7C" stroke-width="1" opacity="0.8"/>
    <text x="213" y="35" text-anchor="middle" fill="#555" font-size="9">（空）</text>
  </g>

  <!-- Tier D -->
  <g transform="translate(10, 388)">
    <rect x="0" y="0" width="50" height="56" fill="#74C0FC" rx="4"/>
    <text x="25" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">D</text>
    <rect x="56" y="0" width="314" height="56" fill="#2a2a3e" rx="4" stroke="#74C0FC" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Tier E -->
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="50" height="56" fill="#B197FC" rx="4"/>
    <text x="25" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">E</text>
    <rect x="56" y="0" width="314" height="56" fill="#2a2a3e" rx="4" stroke="#B197FC" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- + Tier追加 -->
  <rect x="10" y="514" width="370" height="30" rx="4" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="195" y="534" text-anchor="middle" fill="#888" font-size="11">＋ Tier を追加</text>

  <!-- ========== POOL AREA ========== -->
  <rect x="10" y="556" width="370" height="240" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="25" y="578" fill="#aaa" font-size="12" font-weight="bold">未配置アイテム（プール）</text>

  <!-- タブ切り替え -->
  <rect x="20" y="588" width="80" height="24" rx="4" fill="#0f3460"/>
  <text x="60" y="604" text-anchor="middle" fill="#fff" font-size="9">🔗 URL追加</text>
  <rect x="104" y="588" width="100" height="24" rx="4" fill="#2a2a3e" stroke="#555" stroke-width="1"/>
  <text x="154" y="604" text-anchor="middle" fill="#aaa" font-size="9">📁 画像アップロード</text>

  <!-- URL入力（フル幅） -->
  <rect x="20" y="620" width="280" height="28" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="30" y="639" fill="#555" font-size="10">https://example.com/image.png</text>
  <rect x="306" y="620" width="50" height="28" rx="4" fill="#0f3460"/>
  <text x="331" y="639" text-anchor="middle" fill="#fff" font-size="10">追加</text>

  <!-- プール内アイテム（グリッド） -->
  <rect x="20" y="658" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="42" y="684" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <rect x="70" y="658" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="92" y="684" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <!-- ローカル画像バッジ -->
  <rect x="120" y="658" width="44" height="44" rx="3" fill="#333" stroke="#FFA94D" stroke-width="1"/>
  <text x="142" y="684" text-anchor="middle" fill="#888" font-size="8">IMG</text>
  <rect x="144" y="660" width="18" height="12" rx="2" fill="#FFA94D"/>
  <text x="153" y="669" text-anchor="middle" fill="#333" font-size="7">🔒</text>

  <rect x="170" y="658" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="192" y="684" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <rect x="220" y="658" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="242" y="684" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <rect x="270" y="658" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="292" y="684" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <!-- Row 2 -->
  <rect x="20" y="708" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="42" y="734" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <rect x="70" y="708" width="44" height="44" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="92" y="734" text-anchor="middle" fill="#888" font-size="8">IMG</text>

  <text x="195" y="780" text-anchor="middle" fill="#555" font-size="9">ロングプレスでドラッグ開始</text>

  <!-- ========== FOOTER ========== -->
  <rect x="0" y="810" width="390" height="34" fill="#16213e"/>
  <text x="195" y="832" text-anchor="middle" fill="#555" font-size="9">© 2026 Tier List Maker</text>
</svg>